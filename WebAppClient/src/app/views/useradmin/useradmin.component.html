<div class="card">
    <div class="row">
        <div class="col-12">
            <h3><b>Administración de Usuarios</b></h3>
        </div>
    </div>

    <div class="row">
        <div class="col-12" style="padding-top: 0px; text-align-last: right;">
            <button type="button" style="align-self: flex-start" class="btn btn-outline-success mb-3">
                <i class="fas fa-user-plus"></i> Agregar Usuario
            </button>
        </div>
    </div>

    <p-table 
        [value]="userList"
        rowGroupMode="rowspan"
        [resizableColumns]="true" 
        styleClass="p-datatable-gridlines" 
        [tableStyle]="{'min-width': '50rem'}"
        [styleClass]="selectedSize.class"
        editMode="row">
        <ng-template pTemplate="header">
            <tr>
                <th pResizableColumn style="width:25%">Nombre</th>
                <th pResizableColumn style="width:25%">Usuario</th>
                <th pResizableColumn style="width:20%">Rol</th>
                <th pResizableColumn style="width:10%">Estatus</th>
                <th pResizableColumn style="width:10%">Visible</th>
                <th pResizableColumn style="width:10%"></th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-user>
            <tr>
                    <td>{{ user.name }}</td>
                    <td>{{ user.userName }}</td>
                    <td>{{ user.role }}</td>
                    <td>
                        <p-tag severity="success" value="Activo" [rounded]="true"></p-tag>
                        <!-- <p-checkbox inputId="showTimeline" [(ngModel)]="user.status" [binary]="true" inputId="binary"></p-checkbox> -->
                    </td>
                    <td>
                        <!-- <p-checkbox inputId="showTimeline" [(ngModel)]="user.visible" [binary]="true" inputId="binary"></p-checkbox> -->
                        <p-tag icon="pi pi-check" severity="primary" value="" [rounded]="true"></p-tag>
                    </td>
                    <td>
                        <div class="flex align-items-center justify-content-center gap-2">
                            <button (click)="showDialog()" id="btnEdit" aria-label="btnEdit" type="button" class="btn-custom primary">
                                <i class="pi pi-pencil" style="font-size: 1rem"></i>
                            </button>
                        </div>
                    </td>
            </tr>
        </ng-template>
    </p-table>
</div>

<p-dialog [(visible)]="isShowModal" [position]="postionModal" [modal]="true" [breakpoints]="{ '960px': '75vw' }" [style]="{ width: '50vw', height:'38vw' }" [draggable]="false" [resizable]="true" [maximizable]="true">
    <ng-template pTemplate="header">
        <i class="fas fa-user-edit ml-2" style="font-size: 1.5rem; color: #3B71CA;"></i>
        <Label class="text-xl font-bold content-2 ml-2">Editar Usuario</Label>
    </ng-template>
    <ng-template pTemplate="body">

        <div class="row mt-1">
            <div class="col-12">
                <div class="p-inputgroup">
                    <span class="p-float-label">
                        <input id="description" type="text" class="p-inputtext-sm" pInputText />
                        <label for="description">Nombre</label>
                    </span>
                    <span class="p-inputgroup-addon"><i class="pi pi-info-circle"></i></span>
                </div>
            </div>
        </div>

        <div class="row mt-2">
            <div class="col-12">
                <div class="p-inputgroup">
                    <span class="p-float-label">
                        <input id="user" type="text" class="p-inputtext-sm" pInputText/>
                        <label for="user">Usuario</label>
                    </span>
                    <span class="p-inputgroup-addon"><i class="pi pi-user"></i></span>
                </div>
            </div>
        </div>

        <div class="row mt-2">
            <div class="col-12">
                <div class="p-inputgroup">
                    <span class="p-float-label">
                        <input id="password" type="password" class="p-inputtext-sm" pInputText/>
                        <label for="password">Contraseña</label>
                    </span>
                    <span class="p-inputgroup-addon"><i class="pi pi-key"></i></span>
                </div>
            </div>
        </div>

        <div class="row mt-2">
            <div class="col-12 md:col-4">
                <span class="p-float-label">
                    <p-dropdown [options]="roleList"  placeholder="Seleccione un rol de usuario" optionLabel="roleName" inputId="float-label" appendTo="body"></p-dropdown>
                    <label for="float-label">Rol de usuario</label>
                </span>
            </div>

            <div class="col-12 md:col-8">
                <div class="flex align-items-left justify-content-left mt-2">
                    <p-checkbox class="ml-6" inputId="showTimeline" [binary]="true" inputId="binary"></p-checkbox>
                    <label class="ml-2" for="showTimeline">Activo</label>

                    <p-checkbox class="ml-4" inputId="showTimeline" [binary]="true" inputId="binary"></p-checkbox>
                    <label class="ml-2" for="showTimeline">Visible</label>
                </div>
            </div>
            <!--
            <div class="col-12 md:col-4">
                <div class="flex align-items-center justify-content-center gap-2">
                    <div class="d-flex justify-content-center align-items-center">
                        <p-checkbox inputId="showTimeline" [binary]="true" inputId="binary"></p-checkbox>
                        <label class="ml-3" for="showTimeline">Visible</label>
                    </div>
                </div>
            </div>
            -->
        </div>
        <div class="row mt-2">
            <div class="col-12 md:col-6">
                <span class="p-float-label">
                    <p-multiSelect [options]="projectList" 
                               [group]="true" 
                               [(ngModel)]="selectedProjects" 
                               defaultLabel="Seleccione un proyecto" 
                               display="chip"
                               appendTo="body"
                               inputId="projects">
                        <ng-template let-group pTemplate="group">
                            <div class="flex align-items-center">
                                <span>{{ group.label }}</span>
                            </div>
                        </ng-template>
                    </p-multiSelect>
                    <label for="projects">Proyectos asignados</label>
                </span>

                
            </div>
        </div>

    </ng-template>
    <ng-template pTemplate="footer">
        <p-button icon="pi pi-times" (click)="isShowModal = false" label="Cancelar" styleClass="p-button-raised p-button-secondary"></p-button>
        <p-button icon="pi pi-save" (click)="isShowModal = false" label="Guardar" styleClass="p-button-raised p-button-info"></p-button>
    </ng-template>
</p-dialog>
